<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An interactive Valentine's Day pixel art heart"
    />
    <title>I Love ♥</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="valentine-container">
      <div class="browser-window">
        <div class="browser-chrome">
          <div class="browser-title-bar">
            <div class="browser-title-text">
              <div class="browser-icon">♥</div>
              <div>Love Browser</div>
            </div>
            <div class="browser-controls">
              <div class="browser-control minimize">_</div>
              <div class="browser-control maximize">□</div>
              <div class="browser-control close">×</div>
            </div>
          </div>
          <div class="browser-tab-strip" role="tablist" aria-label="Love tabs">
            <button
              class="browser-tab active"
              id="heartTab"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="heartPanel"
              data-tab="heart"
            >
              <span class="tab-icon">
                <span class="tab-favicon" aria-hidden="true"></span>
                <span class="tab-heart">♥</span>
              </span>
              <span class="tab-label">Fill Your Heart</span>
            </button>
            <button
              class="browser-tab inactive"
              id="musicTab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="musicPanel"
              data-tab="music"
            >
              <span class="tab-icon">
                <span class="tab-favicon" aria-hidden="true"></span>
                <span class="tab-heart">♪</span>
              </span>
              <span class="tab-label">Jukebox</span>
            </button>
            <button
              class="browser-tab inactive"
              id="memoryTab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="memoryPanel"
              data-tab="memory"
            >
              <span class="tab-icon">
                <span class="tab-favicon" aria-hidden="true"></span>
                <span class="tab-heart">🏞</span>
              </span>
              <span class="tab-label">Memory lane</span>
            </button>
          </div>
          <div class="browser-toolbar">
            <div class="browser-nav">
              <button class="toolbar-button" type="button" aria-label="Back">
                &lt;
              </button>
              <button
                class="toolbar-button"
                type="button"
                aria-label="Forward"
              >
                &gt;
              </button>
              <button class="toolbar-button" type="button" aria-label="Reload">
                o
              </button>
            </div>
            <div class="browser-address">
              <input
                class="address-input"
                type="text"
                value="https://heart.local"
                readonly
              />
              <button class="address-go" type="button">Go</button>
              <button
                class="bookmark-button"
                type="button"
                aria-label="Bookmark"
              >
                ★
              </button>
            </div>
          </div>
        </div>

        <div class="browser-content">
          <div class="content-area">
            <section
              class="tab-panel active"
              id="heartPanel"
              role="tabpanel"
              aria-labelledby="heartTab"
            >
              <div class="heart-container" id="heartContainer">
                <svg class="heart-pulse-ring" viewBox="0 0 10 9">
                  <g stroke="currentColor" stroke-width="0.3" fill="none">
                    <rect x="2" y="1" width="1" height="1" />
                    <rect x="3" y="1" width="1" height="1" />
                    <rect x="6" y="1" width="1" height="1" />
                    <rect x="7" y="1" width="1" height="1" />
                    <rect x="1" y="2" width="1" height="1" />
                    <rect x="4" y="2" width="1" height="1" />
                    <rect x="5" y="2" width="1" height="1" />
                    <rect x="8" y="2" width="1" height="1" />
                    <rect x="1" y="3" width="1" height="1" />
                    <rect x="8" y="3" width="1" height="1" />
                    <rect x="1" y="4" width="1" height="1" />
                    <rect x="8" y="4" width="1" height="1" />
                    <rect x="2" y="5" width="1" height="1" />
                    <rect x="7" y="5" width="1" height="1" />
                    <rect x="3" y="6" width="1" height="1" />
                    <rect x="6" y="6" width="1" height="1" />
                    <rect x="4" y="7" width="1" height="1" />
                    <rect x="5" y="7" width="1" height="1" />
                  </g>
                </svg>
                <svg class="heart-pulse-ring delay" viewBox="0 0 10 9">
                  <g stroke="currentColor" stroke-width="0.3" fill="none">
                    <rect x="2" y="1" width="1" height="1" />
                    <rect x="3" y="1" width="1" height="1" />
                    <rect x="6" y="1" width="1" height="1" />
                    <rect x="7" y="1" width="1" height="1" />
                    <rect x="1" y="2" width="1" height="1" />
                    <rect x="4" y="2" width="1" height="1" />
                    <rect x="5" y="2" width="1" height="1" />
                    <rect x="8" y="2" width="1" height="1" />
                    <rect x="1" y="3" width="1" height="1" />
                    <rect x="8" y="3" width="1" height="1" />
                    <rect x="1" y="4" width="1" height="1" />
                    <rect x="8" y="4" width="1" height="1" />
                    <rect x="2" y="5" width="1" height="1" />
                    <rect x="7" y="5" width="1" height="1" />
                    <rect x="3" y="6" width="1" height="1" />
                    <rect x="6" y="6" width="1" height="1" />
                    <rect x="4" y="7" width="1" height="1" />
                    <rect x="5" y="7" width="1" height="1" />
                  </g>
                </svg>
                <div class="pixel-heart" id="pixelHeart"></div>
              </div>

              <div class="terminal" id="terminal">
                <div class="terminal-input">
                  <div>
                    <span class="terminal-prompt">&gt; </span>
                    <span class="terminal-prefix" id="prefix" style="display: none"
                      >i love
                    </span>
                    <span class="terminal-text" id="terminalText"></span>
                    <span class="terminal-cursor" id="cursor">_</span>
                  </div>
                </div>
              </div>
            </section>

            <section
              class="tab-panel"
              id="musicPanel"
              role="tabpanel"
              aria-labelledby="musicTab"
            >
              <div class="jukebox" id="musicContainer">
                <div class="jukebox-header">
                  <span class="jukebox-tag">for my favorite person</span>
                  <span class="jukebox-led" id="musicState">stopped</span>
                </div>

                <div class="jukebox-display">
                  <div class="music-title" id="musicTitle">killing-an-afternoon</div>
                  <div class="progress-track" id="progressContainer">
                    <div class="progress-bar" id="progress"></div>
                  </div>
                  <div class="time-row">
                    <span id="currTime">00:00</span>
                    <span id="durTime">00:00</span>
                  </div>
                </div>

                <div class="volume-wrap">
                  <span class="volume-label">Volume</span>
                  <div class="volume-row">
                    <input
                      id="volumeSlider"
                      class="volume-slider"
                      type="range"
                      min="0"
                      max="100"
                      value="70"
                      step="1"
                      aria-label="Volume"
                    />
                    <span class="volume-value" id="volumeValue">70%</span>
                  </div>
                </div>

                <div class="music-controls">
                  <button id="prev" class="music-btn" type="button" aria-label="Previous">
                    &lt;&lt;
                  </button>
                  <button id="play" class="music-btn music-btn-big" type="button" aria-label="Play">
                    &gt;
                  </button>
                  <button id="next" class="music-btn" type="button" aria-label="Next">
                    &gt;&gt;
                  </button>
                </div>

                <audio src="" id="audio"></audio>
              </div>
            </section>

            <section
              class="tab-panel"
              id="memoryPanel"
              role="tabpanel"
              aria-labelledby="memoryTab"
            >
              <div class="jukebox">
                <div class="jukebox-header">
                  <span class="jukebox-tag">Memory lane</span>
                  <span class="jukebox-led">soon</span>
                </div>
                <div class="jukebox-display">
                  <div class="music-title">our sweetest moments, archived here 🏞</div>
                  <div class="time-row">
                    <span>status</span>
                    <span>collecting</span>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>

        <div class="browser-status-bar">
          <span class="status-badge">HTML 3.2 / 56k</span>
          <span id="statusBar" class="status-center">♥</span>
          <span id="statusHint" class="status-hint">Ready</span>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
